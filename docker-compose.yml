version: '3.8'

services:
  backend:
    build:
      context: ./apps/server
    ports:
      - "8000:8000"
    volumes:
      - ./apps/server/app.db:/app/app.db
    environment:
      - DATABASE_URL=sqlite:///./app.db

  frontend:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
